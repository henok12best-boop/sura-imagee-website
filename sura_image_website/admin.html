<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - Sura Image</title>
</head>
<body style="font-family:sans-serif; padding:20px;">
<h2>Admin Panel</h2>

<label>Title:</label><br>
<input id="title"><br><br>

<label>Tagline:</label><br>
<input id="tagline"><br><br>

<label>Upload Images:</label><br>
<input type="file" id="images" multiple><br><br>

<button onclick="save()">Save</button>

<script>
function save() {
  const files = document.getElementById("images").files;
  let images = [];

  if(files.length === 0){
    alert("Add images!");
    return;
  }

  for (let file of files) {
    let reader = new FileReader();
    reader.onload = function(e) {
      images.push(e.target.result);

      if(images.length === files.length){
        let data = {
          title: document.getElementById("title").value,
          tagline: document.getElementById("tagline").value,
          images: images
        };

        localStorage.setItem("suraData", JSON.stringify(data));
        alert("Saved! Now open index.html");
      }
    };
    reader.readAsDataURL(file);
  }
}
</script>
</body>
</html>
